<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deneyler - AperionX</title>
    <link rel="icon" type="image/png" sizes="48x48" href="/uploads/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/uploads/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/uploads/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/uploads/apple-touch-icon.png">
    <link rel="stylesheet" href="/style.css?v=218">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .coming-soon-container {
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out;
            max-width: 500px;
            width: 90%;
        }

        .logo-img {
            max-width: 180px;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .back-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="coming-soon-container">
        <img src="/uploads/logo.png" alt="AperionX Logo" class="logo-img">
        <h1 class="title">Deneyler Çok Yakında!</h1>
        <p class="description">Bilimsel deney simülasyonları ve interaktif laboratuvar modülümüz üzerinde çalışıyoruz. Bizi takipte kalın.</p>
        <a href="/" class="back-btn"><i class="ph-bold ph-arrow-left"></i> Ana Sayfaya Dön</a>
    </div>
</body>
</html>
